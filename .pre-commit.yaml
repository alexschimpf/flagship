# Pre-commit configuration docs: https://pre-commit.com/index.html#install
# All supported hooks: https://pre-commit.com/hooks.html

repos:
  - repo: https://github.com/PyCQA/flake8
    rev: 5.0.4
    hooks:
      - id: flake8
        additional_dependencies:
          - flake8-builtins==2.0.1
          - flake8-comprehensions==3.10.1
          - flake8-eradicate==1.4.0
          - flake8-print==5.0.0
          - flake8-length==0.3.1
          - flake8-quotes==3.3.1
          - flake8-use-fstring==1.4
